palette = "material"

format = """
╭─ $cmd_duration$directory$git_branch$fill$character$line_break╰─ """

[fill]
symbol = '-'
style = 'fg:term8'

[character]
success_symbol = " [](fg:term2)[ ✓ ](bg:term2 fg:term0)[](fg:term2)"
error_symbol = " [](fg:term1)[ ✗ ](bg:term1 fg:term0)[](fg:term1)"

[package]
disabled = true

[git_branch]
style = "bg:term7 fg:term0"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = '[](fg:term7)[ 󰜥 $symbol $branch(:$remote_branch) ]($style)[](fg:term7) '

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](fg:term2)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = false
format = "[•$hostname](bg:term7 bold fg:term0)[](bold fg:term7)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed fg:term2"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:term7 fg:term0"
style_root = "red bold"
format = "[](bold fg:term7)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "󱂵 "
read_only = "󰌾 "
style = "bg:term3 fg:term0"
truncation_length = 2
truncation_symbol = ".../"
format = '[](fg:term3)[$read_only](bg:term3 fg:term1)[$repo_indicator](bg:term3 fg:term1)[$path ]($style)[](fg:term3) '

[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"Music" = " 󰎈 "
"Games" = "  "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "
"git_stuff" = " 󰊤 stuff"
"git" = "  "
"backup" = " 󰁯 "
"python-stuff" = "  stuff"

[cmd_duration]
min_time = 0
style = "bg:term4 fg:term0 bold"
format = '[](fg:term4)[ 󰪢 $duration ]($style)[](fg:term4) '

[palettes.material]
term0  = '#background#'
term1  = '#error#'
term2  = '#primary#'
term3  = '#secondary#'
term4  = '#tertiary#'
term5  = '#tertiary#'
term6  = '#primary#'
term7  = '#onSurface#'
term8  = '#surfaceVariant#'
term9  = '#error#'
term10 = '#primary#'
term11 = '#secondary#'
term12 = '#tertiary#'
term13 = '#tertiary#'
term14 = '#primary#'
term15 = '#onSurface#'
